url: https://ropenspain.github.io/tidyBdE/

template:
  bootstrap: 5
  package: rostemplate
  params:
    ganalytics: "G-CW2RTVRRVF"
  opengraph:
    twitter:
      site: "@rOpenSpain"
      creator: "@dhernangomez"
      card: summary_large_image

repo:
  branch: main

reference:
- title: Catalogs
  desc: Load, update and search BdE time series catalog metadata.
- contents:
  - has_concept("catalog")

- title: Series
  desc: Load series by stable sequential number or API series code.
- contents:
  - has_concept("series")

- title: Selected indicators
  desc: Convenience functions for selected Spanish macroeconomic indicators.
- contents:
  - has_concept("indicators")

- title: Plot utilities
  desc: BdE-inspired palettes, scales and themes for ggplot2 plots.
- contents:
  - has_concept("bde_plot")

- title: Utilities
  desc: Date parsing and supporting utilities.
- contents:
  - has_concept("utils")

- title: About the package
  desc: Package-level documentation.
- contents:
  - tidyBdE-package

articles:
- title: Get started
  contents:
  - tidyBdE
- title: Data sources and formats
  desc: >
    Learn how Banco de España bulk CSV files are structured and how to use
    catalog metadata to identify time series.
  navbar: Data
  contents:
  - csv_manual
  - articles/seriesindex
- title: Examples
  desc: >
    Worked examples using selected Spanish macroeconomic indicators and
    BdE-inspired plotting helpers.
  navbar: Examples
  contents:
  - articles/mainseries

authors:
  Banco de España:
    href: "https://www.bde.es/"

redirects:
- ["articles/Main_Macroeconomic_Series.html", "articles/mainseries.html"]
- ["articles/articles/Series_Index.html", "articles/seriesindex.html"]
