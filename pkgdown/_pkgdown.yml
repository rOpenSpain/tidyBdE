url: https://ropenspain.github.io/tidyBdE/

template:
  bootstrap: 5
  package: rostemplate
  params:
    ganalytics: "G-CW2RTVRRVF"
  opengraph:
    twitter:
      site: "@rOpenSpain"
      creator: "@dhernangomez"
      card: summary_large_image

repo:
  branch: main

reference:
- title: Catalogs
  desc: Tools for working with BdE catalogs.
  contents:
  - has_concept("catalog")

- title: Series
  desc: Tools for working with BdE series.
  contents:
  - has_concept("series")

- title: BdE Indicators
  desc: Relevant macroeconomic indicators of Spain.
  contents:
  - has_concept("indicators")

- title: Plot utilities
  desc: Functions for plotting with ggplot2.
  contents:
  - has_concept("bde_plot")

- title: Utilities
  desc: Internal utility functions.
  contents:
  - has_concept("utils")

- title: About the package
  contents:
  - tidyBdE-package

authors:
  Banco de España:
    href: "https://www.bde.es/"

redirects:
- ["articles/Main_Macroeconomic_Series.html", "articles/mainseries.html"]
- ["articles/articles/Series_Index.html", "articles/seriesindex.html"]
