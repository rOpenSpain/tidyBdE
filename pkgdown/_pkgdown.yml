url: https://ropenspain.github.io/tidyBdE/

template:
  bootstrap: 5
  package: rostemplate
  params:
    ganalytics: "G-CW2RTVRRVF"
  opengraph:
    twitter:
      site: "@rOpenSpain"
      creator: "@dhernangomez"
      card: summary_large_image

repo:
  branch: main

reference:
- title: Catalog metadata
  desc: Discover, load and update Banco de España time series metadata.
- contents:
  - has_concept("catalog")

- title: Time series
  desc: >
    Retrieve time series from bulk CSV files or the Statistics web service
    using stable sequential numbers or API series codes.
- contents:
  - has_concept("series")

- title: Selected indicators
  desc: Retrieve commonly used Spanish macroeconomic indicators.
- contents:
  - has_concept("indicators")

- title: Plotting
  desc: Apply BdE-inspired palettes, scales and themes to **ggplot2** plots.
- contents:
  - has_concept("bde_plot")

- title: Utilities
  desc: Parse date formats used in Banco de España datasets.
- contents:
  - has_concept("utils")

- title: Package
  desc: Learn about **tidyBdE** and its package-level metadata.
- contents:
  - tidyBdE-package

articles:
- title: Get started
  desc: Learn the main **tidyBdE** workflows and data retrieval options.
  contents:
  - tidyBdE
- title: Data discovery and formats
  desc: >
    Learn how Banco de España bulk CSV files are structured and how to use
    catalog metadata to identify time series.
  navbar: Data
  contents:
  - csv_manual
  - articles/seriesindex
- title: Worked examples
  desc: >
    Worked examples using selected Spanish macroeconomic indicators and
    BdE-inspired plotting helpers.
  navbar: Examples
  contents:
  - articles/mainseries

authors:
  Banco de España:
    href: "https://www.bde.es/"

redirects:
- ["articles/Main_Macroeconomic_Series.html", "articles/mainseries.html"]
- ["articles/articles/Series_Index.html", "articles/seriesindex.html"]
